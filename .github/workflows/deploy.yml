name: Deploy smart-omni.ai
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get runner IP
        id: ip
        run: |
          PUBLIC_IP=$(curl -s --retry 3 --retry-delay 2 https://api.ipify.org)
          if [[ ! "$PUBLIC_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Failed to get valid public IP: '$PUBLIC_IP'"
            exit 1
          fi
          echo "ipv4=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "Runner IP: $PUBLIC_IP"

      - name: Open SSH
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.OMNI_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OMNI_HOST }}
          username: ubuntu
          key: ${{ secrets.OMNI_SSH_KEY }}
          command_timeout: 120s
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            cd /var/www/smart-omni.ai

            echo "=== Git pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Install ==="
            npm ci

            echo "=== Build ==="
            npm run build

            echo "=== Nginx reload ==="
            sudo systemctl reload nginx

            echo "=== Done ==="
            ls -la dist/

      - name: Close SSH
        if: always()
        run: |
          IP="${{ steps.ip.outputs.ipv4 }}"
          if [[ "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            aws ec2 revoke-security-group-ingress \
              --group-id ${{ secrets.OMNI_SG_ID }} \
              --protocol tcp --port 22 \
              --cidr ${IP}/32 || true
          else
            echo "No valid IP to revoke, skipping"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
