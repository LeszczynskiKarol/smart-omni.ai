server {
    listen 80;
    server_name smart-omni.ai www.smart-omni.ai;
    return 301 https://smart-omni.ai$request_uri;
}

server {
    listen 443 ssl;
    server_name www.smart-omni.ai;
    ssl_certificate /etc/letsencrypt/live/smart-omni.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smart-omni.ai/privkey.pem;
    return 301 https://smart-omni.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name smart-omni.ai;

    ssl_certificate /etc/letsencrypt/live/smart-omni.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smart-omni.ai/privkey.pem;

    root /var/www/smart-omni/dist;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
